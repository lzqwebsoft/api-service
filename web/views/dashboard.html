{{define "view"}}
<!-- Stats Grid -->
<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-info">
            <h3>应用版本总数</h3>
            <p id="stat-total-apps">{{.TotalApps}}</p>
        </div>
        <div class="stat-icon"><i class="fas fa-box" style="color: var(--primary);"></i></div>
    </div>
    <div class="stat-card">
        <div class="stat-info">
            <h3>启用中版本</h3>
            <p id="stat-active-apps">{{.ActiveApps}}</p>
        </div>
        <div class="stat-icon"><i class="fas fa-bolt" style="color: var(--success);"></i></div>
    </div>
    <div class="stat-card">
        <div class="stat-info">
            <h3>全局已发放 Token</h3>
            <p id="stat-total-tokens">{{.TotalTokens}}</p>
        </div>
        <div class="stat-icon"><i class="fas fa-key" style="color: var(--accent);"></i></div>
    </div>
</div>

<!-- Access Trend Chart -->
<div class="table-card chart-card-padding">
    <h3 class="chart-title">
        <i class="fas fa-chart-line"></i>
        每日 Token 访问趋势 (最近 7 天)
    </h3>
    <div class="chart-container chart-container-pos">
        <svg id="trend-svg" width="100%" height="100%" viewBox="0 0 800 350" preserveAspectRatio="none" class="chart-svg-elem">
            <defs>
                <!-- Area gradient -->
                <linearGradient id="chart-area-grad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="var(--primary)" stop-opacity="0.3" />
                    <stop offset="100%" stop-color="var(--primary)" stop-opacity="0.0" />
                </linearGradient>
                <!-- Line gradient -->
                <linearGradient id="chart-line-grad" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="var(--primary)" />
                    <stop offset="100%" stop-color="var(--accent)" />
                </linearGradient>
            </defs>
            <!-- Grid Lines -->
            <g id="grid-lines" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1" stroke-dasharray="3,3"></g>
            <!-- Fill Area under the line -->
            <path id="chart-area" fill="url(#chart-area-grad)" d="" />
            <!-- Line path -->
            <path id="chart-line" fill="none" stroke="url(#chart-line-grad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" d="" />
            <!-- Y-Axis Labels -->
            <g id="y-axis-labels" fill="var(--text-muted)" font-size="11px" font-family="var(--font-sans)"></g>
            <!-- X-Axis Labels -->
            <g id="x-axis-labels" fill="var(--text-muted)" font-size="11px" font-family="var(--font-sans)"></g>
            <!-- Data Points Circles -->
            <g id="data-points"></g>
            <!-- Hover vertical guide line -->
            <line id="hover-line" x1="0" y1="0" x2="0" y2="0" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-dasharray="2,2" />
        </svg>
        <!-- Overlay HTML Tooltip -->
        <div id="chart-tooltip" class="chart-tooltip-elem">
            <div id="tooltip-date" class="tooltip-date"></div>
            <div class="tooltip-val-container">
                <span class="tooltip-dot"></span>
                访问次数: <span id="tooltip-value" class="tooltip-val"></span>
            </div>
        </div>
    </div>
</div>

<script>
function drawChart() {
    let trendData = [];
    try {
        trendData = JSON.parse('{{.TrendJSON}}');
    } catch(e) {
        console.error("Failed to parse TrendJSON:", e);
    }
    
    if (!trendData || trendData.length === 0) return;

    const svg = document.getElementById('trend-svg');
    const gridGroup = document.getElementById('grid-lines');
    const chartLine = document.getElementById('chart-line');
    const chartArea = document.getElementById('chart-area');
    const xAxisGroup = document.getElementById('x-axis-labels');
    const yAxisGroup = document.getElementById('y-axis-labels');
    const pointsGroup = document.getElementById('data-points');
    const tooltip = document.getElementById('chart-tooltip');
    const tooltipDate = document.getElementById('tooltip-date');
    const tooltipValue = document.getElementById('tooltip-value');
    const hoverLine = document.getElementById('hover-line');

    const svgWidth = 800;
    const svgHeight = 350;
    const paddingLeft = 50;
    const paddingRight = 30;
    const paddingTop = 30;
    const paddingBottom = 40;

    const chartWidth = svgWidth - paddingLeft - paddingRight;
    const chartHeight = svgHeight - paddingTop - paddingBottom;

    // Find max value for Y scaling
    const maxVal = Math.max(...trendData.map(d => d.count), 0);
    const yMax = maxVal > 0 ? Math.ceil(maxVal * 1.2) : 10; // default max limit is 10

    // Clear old elements
    gridGroup.innerHTML = '';
    xAxisGroup.innerHTML = '';
    yAxisGroup.innerHTML = '';
    pointsGroup.innerHTML = '';

    // Draw Y grid lines & labels
    const yTicksCount = 5;
    for (let i = 0; i <= yTicksCount; i++) {
        const val = Math.round((yMax / yTicksCount) * i);
        const y = paddingTop + chartHeight - (val / yMax) * chartHeight;
        
        // Grid line (horizontal)
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', paddingLeft);
        line.setAttribute('y1', y.toString());
        line.setAttribute('x2', (svgWidth - paddingRight).toString());
        line.setAttribute('y2', y.toString());
        gridGroup.appendChild(line);

        // Text label
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', (paddingLeft - 12).toString());
        text.setAttribute('y', (y + 4).toString());
        text.setAttribute('text-anchor', 'end');
        text.textContent = val.toString();
        yAxisGroup.appendChild(text);
    }

    // Map points to coordinates
    const points = trendData.map((d, i) => {
        const x = trendData.length > 1 ? paddingLeft + (i * (chartWidth / (trendData.length - 1))) : paddingLeft + chartWidth / 2;
        const y = paddingTop + chartHeight - (d.count / yMax) * chartHeight;
        return { x, y, date: d.date, count: d.count };
    });

    // Construct path commands
    let linePathD = '';
    let areaPathD = '';

    if (points.length > 0) {
        // Line path
        linePathD = `M ${points[0].x} ${points[0].y}`;
        for (let i = 1; i < points.length; i++) {
            const prev = points[i - 1];
            const curr = points[i];
            const cpX1 = prev.x + (curr.x - prev.x) / 2;
            const cpY1 = prev.y;
            const cpX2 = prev.x + (curr.x - prev.x) / 2;
            const cpY2 = curr.y;
            linePathD += ` C ${cpX1} ${cpY1}, ${cpX2} ${cpY2}, ${curr.x} ${curr.y}`;
        }

        // Area path closure
        areaPathD = `${linePathD} L ${points[points.length - 1].x} ${paddingTop + chartHeight} L ${points[0].x} ${paddingTop + chartHeight} Z`;
    }

    chartLine.setAttribute('d', linePathD);
    chartArea.setAttribute('d', areaPathD);

    // Draw X grid lines, labels and data points
    points.forEach((pt, i) => {
        // X-axis label
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', pt.x.toString());
        text.setAttribute('y', (svgHeight - paddingBottom + 20).toString());
        text.setAttribute('text-anchor', 'middle');
        
        // Format date to show MM-DD
        const parts = pt.date.split('-');
        const shortDate = parts.length >= 3 ? `${parts[1]}-${parts[2]}` : pt.date;
        text.textContent = shortDate;
        xAxisGroup.appendChild(text);

        // Grid line vertical
        if (i > 0 && i < points.length - 1) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', pt.x.toString());
            line.setAttribute('y1', paddingTop.toString());
            line.setAttribute('x2', pt.x.toString());
            line.setAttribute('y2', (svgHeight - paddingBottom).toString());
            gridGroup.appendChild(line);
        }

        // Circular marker
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', pt.x.toString());
        circle.setAttribute('cy', pt.y.toString());
        circle.setAttribute('r', '5');
        circle.setAttribute('fill', 'var(--bg-base)'); // Matches base background
        circle.setAttribute('stroke', 'var(--primary)');
        circle.setAttribute('stroke-width', '3');
        circle.style.cursor = 'pointer';
        circle.style.transition = 'all 0.15s ease';

        // Add interactive hover effects
        circle.addEventListener('mouseenter', (e) => {
            circle.setAttribute('r', '7');
            circle.setAttribute('fill', 'var(--primary)');
            
            // Show hover guide line
            hoverLine.setAttribute('x1', pt.x.toString());
            hoverLine.setAttribute('y1', paddingTop.toString());
            hoverLine.setAttribute('x2', pt.x.toString());
            hoverLine.setAttribute('y2', (svgHeight - paddingBottom).toString());
            hoverLine.style.display = 'block';

            // Position and show HTML tooltip
            const rect = svg.getBoundingClientRect();
            const scaleX = rect.width / svgWidth;
            const scaleY = rect.height / svgHeight;
            
            const tooltipX = (pt.x * scaleX) + 15;
            const tooltipY = (pt.y * scaleY) - 50;

            tooltip.style.left = `${tooltipX}px`;
            tooltip.style.top = `${tooltipY}px`;
            tooltipDate.textContent = pt.date;
            tooltipValue.textContent = pt.count + ' 次';
            tooltip.style.display = 'block';
        });

        circle.addEventListener('mouseleave', () => {
            circle.setAttribute('r', '5');
            circle.setAttribute('fill', 'var(--bg-base)');
            hoverLine.style.display = 'none';
            tooltip.style.display = 'none';
        });

        pointsGroup.appendChild(circle);
    });
}

document.addEventListener('DOMContentLoaded', drawChart);
window.addEventListener('resize', drawChart);
</script>
{{end}}
