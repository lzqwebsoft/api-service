{{define "view"}}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <h1>控制台登录</h1>
            <p>请输入管理员凭据以访问控制台</p>
        </div>
        
        {{if .Error}}
        <div class="alert-error d-block mb-4">
            <i class="fas fa-exclamation-circle mr-2"></i>{{.Error}}
        </div>
        {{end}}

        <form id="login-form" action="/admin/login" method="POST">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" class="input-control" placeholder="输入管理员用户名" value="{{.LoginUsername}}" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" class="input-control" placeholder="输入密码" required>
            </div>
            
            <div class="form-group">
                <label for="captcha">验证码</label>
                <div class="captcha-row">
                    <input type="text" id="captcha" name="captcha_code" class="input-control" placeholder="4位验证码" autocomplete="off" required>
                    <img src="/admin/captcha" id="captcha-img" onclick="this.src='/admin/captcha?t=' + Math.random()" title="点击刷新验证码" class="captcha-img">
                </div>
            </div>

            <button type="submit" class="btn mt-6">
                <span>安全登录</span>
            </button>
        </form>
    </div>
</div>
{{end}}
